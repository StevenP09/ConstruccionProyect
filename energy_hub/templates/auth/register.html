{% extends "base.html" %}
{% load static %}

{% block title %}Registro - Energy Hub{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-card-large">
        <div class="text-center">
            <div class="auth-logo">
                <i data-feather="zap"></i>
            </div>
            <h1 class="auth-title">Crear Cuenta</h1>
            <p class="auth-subtitle">Únete a EnergyHub y comienza a ahorrar energía hoy</p>
        </div>

        <form method="post" class="auth-form space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="form-label">Nombre Completo</label>
                    <div class="input-group">
                        <span class="input-icon"><i data-feather="user"></i></span>
                        <input type="text" name="name" placeholder="Juan Pérez"
                               class="form-input input-with-icon" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="form-label">Nombre del Hogar</label>
                    <div class="input-group">
                        <span class="input-icon"><i data-feather="home"></i></span>
                        <input type="text" name="home_name" placeholder="Mi Casa"
                               class="form-input input-with-icon" required>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-icon"><i data-feather="mail"></i></span>
                    <input type="email" name="email" placeholder="ejemplo@correo.com"
                           class="form-input input-with-icon" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon"><i data-feather="lock"></i></span>
                        <input type="password" id="password-input" name="password" placeholder="••••••••"
                               class="form-input input-with-icon input-with-icon-right" required>
                        <button type="button" class="input-icon-right" data-toggle-password="password-input">
                            <i data-feather="eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar">
                            <div id="password-strength-fill" class="password-strength-fill" style="width: 0%;"></div>
                        </div>
                        <p id="password-strength-label" class="password-strength-label"></p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="form-label">Confirmar Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon"><i data-feather="lock"></i></span>
                        <input type="password" id="confirm-password-input" name="confirm_password" placeholder="••••••••"
                               class="form-input input-with-icon input-with-icon-right" required>
                        <button type="button" class="input-icon-right" data-toggle-password="confirm-password-input">
                            <i data-feather="eye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <label class="flex items-start gap-2">
                <input type="checkbox" class="form-checkbox" style="margin-top: 0.25rem;" required>
                <span class="text-sm text-muted-foreground">
                    Acepto los términos y condiciones y la política de privacidad de EnergyHub
                </span>
            </label>

            <button type="submit" class="btn btn-primary w-full">
                Crear Cuenta
            </button>

            <p class="auth-footer">
                ¿Ya tienes una cuenta?
                <a href="{% url 'login' %}" class="auth-link">Inicia sesión</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
